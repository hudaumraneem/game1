<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الذاكرة الهندسي المطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f7 100%);
            user-select: none;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            perspective: 1000px;
        }

        @media (max-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .memory-card {
            aspect-ratio: 1 / 1.3;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            transform: rotateY(180deg) scale(0.95);
            cursor: default;
        }

        .memory-card.matched .card-back {
            background-color: #f0fff4 !important;
            border: 5px solid #22c55e !important;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            box-shadow: 0 8px 15px -5px rgba(0,0,0,0.1);
            border: 4px solid white;
            padding: 10px;
            text-align: center;
        }

        /* Front of card (Hidden state) */
        .card-front {
            background: linear-gradient(45deg, #4f46e5, #9333ea);
            color: white;
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.1);
        }

        /* Back of card (Revealed state) */
        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            color: #1e293b;
            flex-direction: column;
            gap: 8px;
        }

        .card-back.property-card {
            font-size: 0.85rem;
            font-weight: 700;
            color: #4b5563;
            background: #fff9db; 
            border-color: #fab005;
        }

        .card-back.name-card {
            font-size: 0.95rem;
            font-weight: 800;
            color: #2b8a3e;
            background: #e7f5ff;
            border-color: #228be6;
        }

        .shape-svg {
            width: 85px;
            height: 85px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        /* Animations */
        .pop-up {
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .success-pulse {
            animation: pulse 0.5s ease-in-out;
        }
        @keyframes pulse {
            0% { transform: rotateY(180deg) scale(0.95); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(0.95); }
        }

        /* Confetti piece styling */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            top: -10px;
            z-index: 1000;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-8 relative">

    <audio id="match-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2895/2895-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="win-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
    </audio>

    <header class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-black text-indigo-600 mb-2 drop-shadow-sm">💎 لغز المجسمات الهندسي</h1>
        <p class="text-slate-600 font-bold bg-white/60 backdrop-blur-sm px-6 py-2 rounded-full shadow-sm inline-block border border-indigo-100">طابق صورة المجسم مع وصف مكوناته الهندسية!</p>
    </header>

    <div class="mb-6 flex gap-6 md:gap-16 text-xl font-bold text-slate-700 bg-white/90 backdrop-blur-md px-10 py-4 rounded-3xl shadow-lg border-b-4 border-indigo-200">
        <div class="flex items-center gap-2">
            <span class="text-indigo-400 text-2xl font-black">🔄</span> المحاولات: <span id="moves" class="text-indigo-600">0</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-yellow-500 text-2xl font-black">⭐</span> الأزواج: <span id="matches" class="text-yellow-600">0</span> / 6
        </div>
    </div>

    <main class="w-full max-w-4xl">
        <div id="game-board" class="game-grid"></div>
    </main>

    <div id="win-modal" class="fixed inset-0 bg-indigo-900/90 backdrop-blur-md flex flex-col items-center justify-center text-white hidden z-50 p-6 text-center">
        <div class="text-[10rem] mb-6 floating">🏆</div>
        <h2 class="text-6xl font-black mb-4 drop-shadow-lg text-yellow-300">عبقري هندسة!</h2>
        <p class="text-2xl mb-8 opacity-90 max-w-lg font-bold">رائع! لقد أظهرت مهارة فائقة في تمييز المجسمات وخصائصها.</p>
        <div class="bg-white/20 border border-white/20 p-8 rounded-3xl mb-10 shadow-inner">
            <p class="text-3xl font-black">عدد المحاولات الإجمالي: <span id="final-moves">0</span></p>
        </div>
        <button onclick="resetGame()" class="bg-yellow-400 text-indigo-900 px-16 py-5 rounded-2xl font-black text-3xl shadow-2xl hover:bg-yellow-300 hover:scale-105 transition-all active:scale-95 border-b-8 border-yellow-600">لعب مجدداً 🚀</button>
    </div>

    <script>
        const cardPairs = [
            { 
                id: 'cube', 
                name: 'المكعب', 
                visual: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M25 45 L55 45 L55 75 L25 75 Z" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
                    <path d="M25 45 L40 30 L70 30 L55 45 Z" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2"/>
                    <path d="M55 45 L70 30 L70 60 L55 75 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
                </svg>`,
                property: 'يتكون من 6 مربعات متطابقة.' 
            },
            { 
                id: 'pyramid', 
                name: 'الهرم الرباعي', 
                visual: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M50 20 L80 75 L50 85 Z" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
                    <path d="M50 20 L20 75 L50 85 Z" fill="#fbbf24" stroke="#b45309" stroke-width="2"/>
                </svg>`,
                property: 'يتكون من مربع واحد و4 مثلثات.' 
            },
            { 
                id: 'cylinder', 
                name: 'الأسطوانة', 
                visual: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M25 35 L25 75 A25 10 0 0 0 75 75 L75 35 Z" fill="#10b981" stroke="#065f46" stroke-width="2"/>
                    <ellipse cx="50" cy="35" rx="25" ry="10" fill="#34d399" stroke="#065f46" stroke-width="2"/>
                </svg>`,
                property: 'تتكون من دائرتين ومستطيل واحد.' 
            },
            { 
                id: 'cone', 
                name: 'المخروط', 
                visual: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M50 20 L25 75 A25 10 0 0 0 75 75 Z" fill="#8b5cf6" stroke="#5b21b6" stroke-width="2"/>
                    <path d="M25 75 A25 10 0 0 0 75 75" fill="none" stroke="#5b21b6" stroke-width="2"/>
                </svg>`,
                property: 'يتكون من دائرة واحدة وسطح منحني.' 
            },
            { 
                id: 'prism', 
                name: 'المنشور الثلاثي', 
                visual: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M20 70 L50 70 L35 40 Z" fill="#06b6d4" stroke="#155e75" stroke-width="2"/>
                    <path d="M35 40 L65 20 L80 50 L50 70 Z" fill="#22d3ee" stroke="#155e75" stroke-width="2"/>
                    <path d="M50 70 L80 50" fill="none" stroke="#155e75" stroke-width="2"/>
                </svg>`,
                property: 'يتكون من مثلثين و3 مستطيلات.' 
            },
            { 
                id: 'pent_pyramid', 
                name: 'الهرم الخماسي', 
                visual: `<svg viewBox="0 0 100 100" class="shape-svg">
                    <path d="M50 20 L40 80 L60 80 Z" fill="#db2777" stroke="#9d174d" stroke-width="2"/>
                    <path d="M50 20 L25 65 L40 80 Z" fill="#ec4899" stroke="#9d174d" stroke-width="2"/>
                    <path d="M50 20 L60 80 L75 65 Z" fill="#f472b6" stroke="#9d174d" stroke-width="2"/>
                </svg>`,
                property: 'يتكون من شكل خماسي و5 مثلثات.' 
            }
        ];

        let gameData = [];
        cardPairs.forEach(pair => {
            gameData.push({ id: pair.id, content: pair.name, visual: pair.visual, type: 'name' });
            gameData.push({ id: pair.id, content: pair.property, visual: '🧩', type: 'property' });
        });

        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let lockBoard = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createCard(data, index) {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = data.id;
            card.dataset.index = index;

            // Updated card back to Question Mark
            let innerHTML = `<div class="card-face card-front text-white">؟</div>`;
            
            if (data.type === 'name') {
                innerHTML += `
                    <div class="card-back card-face name-card">
                        <div class="mb-2 scale-110">${data.visual}</div>
                        <p class="font-bold">${data.content}</p>
                    </div>
                `;
            } else {
                innerHTML += `
                    <div class="card-back card-face property-card">
                        <div class="text-3xl mb-3 text-orange-400">📜</div>
                        <p class="px-2 font-bold">${data.content}</p>
                    </div>
                `;
            }

            card.innerHTML = innerHTML;
            card.addEventListener('click', flipCard);
            return card;
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === flippedCards[0]) return;
            if (this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkForMatch();
            }
        }

        function checkForMatch() {
            const isMatch = flippedCards[0].dataset.id === flippedCards[1].dataset.id;
            if (isMatch) disableCards();
            else unflipCards();
        }

        function disableCards() {
            const matchSound = document.getElementById('match-sound');
            if (matchSound) {
                matchSound.currentTime = 0;
                matchSound.play().catch(e => {});
            }

            flippedCards.forEach(card => card.classList.add('matched', 'success-pulse'));
            matchedPairs++;
            document.getElementById('matches').innerText = matchedPairs;
            resetBoard();
            
            if (matchedPairs === cardPairs.length) {
                setTimeout(showWinModal, 800);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                flippedCards[0].classList.remove('flipped');
                flippedCards[1].classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [flippedCards, lockBoard] = [[], false];
        }

        function showWinModal() {
            const winSound = document.getElementById('win-sound');
            if (winSound) {
                winSound.currentTime = 0;
                winSound.play().catch(e => {});
            }

            document.getElementById('final-moves').innerText = moves;
            document.getElementById('win-modal').classList.remove('hidden');
            document.getElementById('win-modal').classList.add('pop-up');
            
            // Trigger celebrations
            startConfetti();
        }

        function startConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.opacity = Math.random();
                document.body.appendChild(confetti);
                
                // Cleanup
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function resetGame() {
            const winSound = document.getElementById('win-sound');
            if (winSound) {
                winSound.pause();
                winSound.currentTime = 0;
            }

            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matchedPairs = 0;
            moves = 0;
            document.getElementById('moves').innerText = '0';
            document.getElementById('matches').innerText = '0';
            document.getElementById('win-modal').classList.add('hidden');
            
            // Remove any lingering confetti
            document.querySelectorAll('.confetti').forEach(c => c.remove());
            
            initGame();
        }

        function initGame() {
            const shuffledCards = shuffle([...gameData]);
            const board = document.getElementById('game-board');
            shuffledCards.forEach((data, index) => board.appendChild(createCard(data, index)));
        }

        window.onload = initGame;
    </script>
</body>
</html>
